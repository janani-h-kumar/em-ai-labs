name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2  # Updated to latest patch

      - name: Set up Python
        uses: actions/setup-python@v5.3.0  # Updated to latest patch
        with:
          python-version: "3.11"
          cache: "pip" # Caches dependencies to speed up future runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Explicit safety fallback if your pyproject.toml/setup.py lacks them:
          pip install ruff mypy pytest 

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        env:
          OLLAMA_HOST: ""
          ANTHROPIC_API_KEY: ""
        run: pytest tests/ -v --tb=short