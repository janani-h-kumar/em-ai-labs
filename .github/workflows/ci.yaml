name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Static analysis
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "uv"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: uv run ruff format src/ tests/ --check

      # Enable later after type coverage improves
      # - name: Mypy type check
      #   run: uv run mypy src/ --ignore-missing-imports --strict-optional

  # ──────────────────────────────────────────────
  # JOB 2: Security scan
  # ──────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "uv"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bandit — common Python security issues
        run: |
          uv run bandit -r src/ \
            -ll \
            --skip B101

      - name: pip-audit — dependency vulnerability scan
        run: |
          # Temporary ignores:
          #
          # GHSA-6w46-j5rx-g56g
          # pytest ecosystem not yet compatible with pytest 9
          #
          # PYSEC-2026-76 / 77
          # LangChain 1.x migration pending
          uv run pip-audit \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln PYSEC-2026-76 \
            --ignore-vuln PYSEC-2026-77

  # ──────────────────────────────────────────────
  # JOB 3: Unit tests
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [static-analysis]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "uv"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60
        env:
          OLLAMA_HOST: ""
          WEATHER_API_KEY: ""
          ANTHROPIC_API_KEY: ""

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # JOB 4: Integration tests
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    if: ${{ github.repository_owner == 'janani-h-kumar' && github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "uv"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

          nohup ollama serve > ollama.log 2>&1 &
          sleep 10

          ollama pull phi3:mini

      - name: Verify Ollama health
        run: |
          curl http://localhost:11434/api/tags

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -v \
            --tb=short \
            -m integration
        env:
          OLLAMA_HOST: http://localhost:11434
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}