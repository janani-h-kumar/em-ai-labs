name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Static analysis — runs in ~30 seconds
  # No services, no secrets, just code quality
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint (style + errors)
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ tests/ --check

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports --strict-optional

  # ──────────────────────────────────────────────
  # JOB 2: Security scan
  # Bandit (code patterns) + pip-audit (CVEs)
  # ──────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Install project dependencies
        run: pip install -e .

      - name: Bandit — common Python security issues
        # -ll = only medium and high severity
        # -r  = recursive
        # Skips: B101 (assert), B601 (paramiko shell) — common false positives
        run: bandit -r src/ -ll --skip B101

      - name: pip-audit — known CVEs in dependencies
        run: pip-audit --desc on

  # ──────────────────────────────────────────────
  # JOB 3: Unit tests — fast, no external services
  # Must pass with zero API keys configured
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [static-analysis]

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60
        env:
          # Explicitly unset — unit tests must NOT need these
          OLLAMA_HOST: ""
          WEATHER_API_KEY: ""
          ANTHROPIC_API_KEY: ""

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # JOB 4: Integration tests — optional
  # Only runs when secrets are configured
  # Skipped on forks and PRs from external contributors
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Only run when the secret exists (owner's repo, not forks)
    if: ${{ github.repository_owner == 'janani-h-kumar' && github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull phi3:mini

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m integration
        env:
          OLLAMA_HOST: http://localhost:11434
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}