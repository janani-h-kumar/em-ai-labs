[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai_lab"
version = "0.1.0"
description = "Enterprise-ready AI agent harness"
authors = [{name = "Janani Harihara Kumar"}]
requires-python = ">=3.8"
dependencies = [
    "requests>=2.31",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "anthropic>=0.25",
]

[project.optional-dependencies]
dev = ["pytest", "ruff", "mypy", "pytest-cov"]

[tool.setuptools.packages.find]
where = ["src"]

# Consolidated single pytest block
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short --cov=src --cov-report=term-missing"
pythonpath = [".", "src"]
markers = [
    "integration: Integration tests requiring external services (Ollama, Weather API)"
]