[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "em-ai-labs"
version = "0.1.0"
description = "Enterprise-ready AI agent harness"
authors = [{name = "Janani Harihara Kumar"}]
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "anthropic>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "bandit>=1.7",
    "pip-audit>=2.7",
]

[tool.setuptools.packages.find]
where = ["src"]

# ──────────────────────────────────────────────
# pytest
# ──────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short --cov=src --cov-report=term-missing --cov-fail-under=60"
pythonpath = [".", "src"]
markers = [
    "integration: Integration tests requiring external services (Ollama, APIs)",
]

# ──────────────────────────────────────────────
# ruff — linting + formatting (replaces flake8, isort, black)
# ──────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names)
    "I",    # isort (import ordering)
    "B",    # flake8-bugbear (common bugs and design issues)
    "UP",   # pyupgrade (use modern Python idioms)
    "N",    # pep8-naming conventions
    "LOG",  # flake8-logging (correct logger usage patterns)
    "G",    # flake8-logging-format (no f-strings in log calls)
]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]   # allow assert statements in tests

# ──────────────────────────────────────────────
# mypy — static type checking
# ──────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict_optional = true
warn_return_any = true
warn_unused_configs = true
# Gradually tighten — uncomment as codebase matures:
# disallow_untyped_defs = true
# disallow_any_generics = true